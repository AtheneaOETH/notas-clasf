// ── UTILIDADES DE CÁLCULO ──────────────────────────────────────────────────
function valorNumerico(v) {
  if (v === null || v === undefined || v === '') return null;
  if (typeof v === 'number') return v;
  const s = String(v).trim().toUpperCase();
  if (s === 'IA') return 1.8;
  if (CODIGOS_ESPECIALES.includes(s)) return 0;
  const n = parseFloat(s.replace(',', '.'));
  return isNaN(n) ? null : Math.min(5, Math.max(1, n));
}

function calcularPAC(notas, config) {
  const valores = config.actividades.map(a => valorNumerico(notas[a.letra]));
  const validos = valores.filter(v => v !== null);
  if (validos.length === 0) return null;

  if (config.modo === 'EQUITATIVO') {
    return Math.round((validos.reduce((a, b) => a + b, 0) / validos.length) * 100) / 100;
  } else {
    // PORCENTAJES
    let sumaPonderada = 0, sumaPorc = 0;
    config.actividades.forEach((a, i) => {
      const v = valores[i];
      if (v !== null) {
        sumaPonderada += v * (a.peso / 100);
        sumaPorc += (a.peso / 100);
      }
    });
    return sumaPorc > 0 ? Math.round((sumaPonderada / sumaPorc) * 100) / 100 : null;
  }
}

function calcularAUTO(notas) {
  const coe = valorNumerico(notas.coe);
  const het = valorNumerico(notas.het);
  const pau = valorNumerico(notas.pau);
  const vals = [coe, het, pau].filter(v => v !== null);
  if (vals.length === 0) return null;
  return Math.round((vals.reduce((a, b) => a + b, 0) / vals.length) * 100) / 100;
}

function calcularDEF(pac, auto) {
  if (pac === null && auto === null) return null;
  const p = pac ?? 0;
  const a = auto ?? 0;
  return Math.round((p * 0.9 + a * 0.1) * 100) / 100;
}

function estadoAprobacion(def) {
  if (def === null) return '';
  return def >= MIN_APROBATORIO ? 'APROBÓ' : 'NO APROBÓ';
}

function colorNota(v) {
  if (v === null || v === undefined) return '';
  if (typeof v === 'string' && CODIGOS_ESPECIALES.includes(v.toUpperCase())) return 'cod-esp';
  const n = parseFloat(v);
  if (isNaN(n)) return '';
  if (n >= MIN_APROBATORIO) return 'nota-ok';
  if (n >= 3.0) return 'nota-alerta';
  return 'nota-mal';
}

// ── FIRESTORE HELPERS ──────────────────────────────────────────────────────
async function guardarConfig(grupo, config) {
  await db.collection(`periodos/${PERIODO}/grupos/${grupo}/config`).doc('setup').set(config);
}

async function cargarConfig(grupo) {
  const snap = await db.collection(`periodos/${PERIODO}/grupos/${grupo}/config`).doc('setup').get();
  return snap.exists() ? snap.data() : null;
}

async function guardarNotas(grupo, estudiante, notas) {
  const id = estudiante.replace(/\s+/g, '_');
  await db.collection(`periodos/${PERIODO}/grupos/${grupo}/notas`).doc(id).set({ estudiante, notas, actualizado: new Date().toISOString() });
}

async function cargarNotasGrupo(grupo) {
  const snap = await db.collection(`periodos/${PERIODO}/grupos/${grupo}/notas`).get();
  const result = {};
  snap.forEach(d => { const data = d.data(); result[data.estudiante] = data.notas || {}; });
  return result;
}

const $ = id => document.getElementById(id);
const show = id => $(id).style.display = '';
const hide = id => $(id).style.display = 'none';

function toast(msg, tipo = 'ok') {
  const t = document.createElement('div');
  t.className = `toast toast-${tipo}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add('toast-show'), 10);
  setTimeout(() => { t.classList.remove('toast-show'); setTimeout(() => t.remove(), 300); }, 2500);
}

function setLoading(txt) {
  const el = $('loading-overlay');
  const tel = $('loading-text');
  if (tel) tel.textContent = txt;
  if (el) el.style.display = '';
}
function clearLoading() {
  const el = $('loading-overlay');
  if (el) el.style.display = 'none';
}

      <div id="loading-text" class="loading-text">Cargando...</div>
    </div>`;

  // Eventos sidebar
  document.querySelectorAll('.nav-grupo').forEach(btn => {
    btn.onclick = () => abrirGrupo(btn.dataset.grupo);
  });
  $('btn-signout').onclick = () => auth.signOut();
  $('btn-menu').onclick = () => $('sidebar').classList.toggle('open');
  $('sidebar-close').onclick = () => $('sidebar').classList.remove('open');
  $('modal-close-config').onclick = () => hide('modal-config');
}

async function abrirGrupo(grupo) {
  currentGrupo = grupo;
  $('sidebar').classList.remove('open');
  document.querySelectorAll('.nav-grupo').forEach(b => b.classList.remove('active'));
  $(`nav-${grupo}`)?.classList.add('active');

  const nombreGrupo = grupo === '3' ? 'Tercero' :
    grupo.replace('1A','Primero A').replace('1B','Primero B')
        .replace('2A','Segundo A').replace('2B','Segundo B')
        .replace('4A','Cuarto A').replace('4B','Cuarto B')
        .replace('5A','Quinto A').replace('5B','Quinto B')
        .replace('6A','Sexto A').replace('6B','Sexto B')
        .replace('7A','Séptimo A').replace('7B','Séptimo B')
        .replace('8A','Octavo A').replace('8B','Octavo B')
        .replace('9A','Noveno A').replace('9B','Noveno B')
        .replace('10A','Décimo A').replace('10B','Décimo B')
        .replace('11A','Once A').replace('11B','Once B');

  $('topbar-title').textContent = `${nombreGrupo} · Período ${PERIODO}`;

  setLoading('Cargando grupo...');
  try {
    configGrupo = await cargarConfig(grupo);
    const notas = await cargarNotasGrupo(grupo);
    notasCache[grupo] = notas;
    clearLoading();

    if (!configGrupo) {
      configGrupo = {modo: 'EQUITATIVO', actividades: []};
    }
    renderPlanilla(grupo, nombreGrupo);
  } catch(e) {
    clearLoading();
    toast('Error cargando datos', 'err');
    console.error(e);
  }
}

function mostrarPanelConfigInicial(grupo, nombreGrupo) {
  $('topbar-actions').innerHTML = '';
  $('panel-grupo').innerHTML = `
    <div class="config-inicial">
      <h2>Configurar <em>${nombreGrupo}</em></h2>
      <p>Este grupo aún no tiene actividades configuradas para el Período ${PERIODO}.<br>Define el modo de calificación antes de ingresar notas.</p>
      <button class="btn-primary" id="btn-abrir-config">⚙ Configurar actividades</button>
    </div>`;
  $('btn-abrir-config').onclick = () => mostrarModalConfig(grupo, nombreGrupo, null);
}

function mostrarModalConfig(grupo, nombreGrupo, configActual) {
  const config = configActual || { modo: 'EQUITATIVO', actividades: [
    {letra:'A', nombre:'Actividad A', peso:20},
    {letra:'B', nombre:'Actividad B', peso:20},
    {letra:'C', nombre:'Actividad C', peso:20},
    {letra:'D', nombre:'Actividad D', peso:20},
    {letra:'E', nombre:'Actividad E', peso:20},
  ]};

  $('modal-config-title').textContent = `Configurar ${nombreGrupo}`;
  $('modal-config-body').innerHTML = `
    <div class="config-form">
      <div class="form-row">
        <label class="form-label">Modo de calificación</label>
        <div class="toggle-modo">
          <button class="toggle-btn ${config.modo==='EQUITATIVO'?'active':''}" data-modo="EQUITATIVO">Equitativo</button>
          <button class="toggle-btn ${config.modo==='PORCENTAJES'?'active':''}" data-modo="PORCENTAJES">Porcentajes</button>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Actividades del bloque cognitivo-procedimental (90%)</label>
        <div id="lista-actividades">
          ${config.actividades.map((a,i) => renderActividadRow(a, i, config.modo)).join('')}
        </div>
        <button class="btn-add-act" id="btn-add-act">+ Agregar actividad</button>
      </div>
      <div class="form-row hint-auto">
        <strong>Autoevaluación (10%)</strong> — COE · HET · PAU se ingresan por separado en la planilla
      </div>
      <div id="suma-pesos-msg"></div>
      <div class="modal-actions">
        <button class="btn-secondary" id="btn-cancel-config">Cancelar</button>
        <button class="btn-primary" id="btn-save-config">Guardar configuración</button>
      </div>
    </div>`;

  show('modal-config');
  actualizarSumaPesos();

  // Toggle modo
  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const modo = btn.dataset.modo;
      document.querySelectorAll('.peso-input').forEach(inp => {
        inp.parentElement.style.display = modo === 'PORCENTAJES' ? '' : 'none';
      });
      actualizarSumaPesos();
    };
  });

  // Add actividad
  $('btn-add-act').onclick = () => {
    const lista = $('lista-actividades');
    const idx = lista.children.length;
    const letras = 'ABCDEFGHIJKLMNOPQRSTUVWXY';
    const letra = letras[idx] || String(idx+1);
    const modo = document.querySelector('.toggle-btn.active')?.dataset.modo || 'EQUITATIVO';
    const div = document.createElement('div');
    div.innerHTML = renderActividadRow({letra, nombre:`Actividad ${letra}`, peso:10}, idx, modo);
    lista.appendChild(div.firstElementChild);
    actualizarSumaPesos();
    attachActividadEvents();
  };

  attachActividadEvents();

  $('btn-cancel-config').onclick = () => hide('modal-config');
  $('btn-save-config').onclick = async () => {
    const modo = document.querySelector('.toggle-btn.active')?.dataset.modo || 'EQUITATIVO';
    const rows = document.querySelectorAll('.act-row');
    const actividades = [];
    rows.forEach(row => {
      const letra = row.querySelector('.act-letra').value.trim().toUpperCase();
      const nombre = row.querySelector('.act-nombre').value.trim();
      const peso = parseFloat(row.querySelector('.peso-input').value) || 0;
      if (letra && nombre) actividades.push({letra, nombre, peso});
    });
    if (actividades.length === 0) { toast('Agrega al menos una actividad', 'err'); return; }
    if (modo === 'PORCENTAJES') {
      const suma = actividades.reduce((s,a) => s + a.peso, 0);
      if (Math.abs(suma - 100) > 0.1) { toast(`Los porcentajes deben sumar 100% (actual: ${suma.toFixed(1)}%)`, 'err'); return; }
    }
    const nuevaConfig = {modo, actividades};
    setLoading('Guardando configuración...');
    try {
      await guardarConfig(grupo, nuevaConfig);
      configGrupo = nuevaConfig;
      clearLoading();
      hide('modal-config');
      toast('Configuración guardada ✓');
      renderPlanilla(grupo, nombreGrupo);
    } catch(e) { clearLoading(); toast('Error guardando', 'err'); }
  };
}

function renderActividadRow(a, i, modo) {
  return `<div class="act-row">
    <input class="act-letra input-sm" value="${a.letra}" maxlength="3" placeholder="A">
    <input class="act-nombre input-md" value="${a.nombre}" placeholder="Nombre de la actividad">
    <div class="peso-wrap" style="${modo==='PORCENTAJES'?'':'display:none'}">
      <input class="peso-input input-xs" type="number" value="${a.peso}" min="0" max="100" step="0.5"> <span class="pct-symbol">%</span>
    </div>
    <button class="btn-del-act" title="Eliminar">🗑</button>
  </div>`;
}

function attachActividadEvents() {
  document.querySelectorAll('.btn-del-act').forEach(btn => {
    btn.onclick = () => { btn.closest('.act-row').remove(); actualizarSumaPesos(); };
  });
  document.querySelectorAll('.peso-input').forEach(inp => {
    inp.oninput = actualizarSumaPesos;
  });
}

function actualizarSumaPesos() {
  const modo = document.querySelector('.toggle-btn.active')?.dataset.modo;
  const msg = $('suma-pesos-msg');
  if (!msg) return;
  if (modo !== 'PORCENTAJES') { msg.textContent = ''; return; }
  const suma = Array.from(document.querySelectorAll('.peso-input')).reduce((s,i) => s + (parseFloat(i.value)||0), 0);
  const ok = Math.abs(suma - 100) < 0.1;
  msg.className = `suma-pesos ${ok ? 'suma-ok' : 'suma-err'}`;
  msg.textContent = `Suma de porcentajes: ${suma.toFixed(1)}% ${ok ? '✓' : '(debe ser 100%)'}`;
}

// ── RENDER PLANILLA ────────────────────────────────────────────────────────
function renderPlanilla(grupo, nombreGrupo) {
  const estudiantes = ESTUDIANTES[grupo] || [];
  const notas = notasCache[grupo] || {};
  const config = configGrupo;
  const letrasActs = config.actividades.map(a => a.letra);

  $('topbar-actions').innerHTML = `
    <button class="btn-secondary btn-sm" id="btn-reconfig">⚙ Configuración</button>
    <button class="btn-primary btn-sm" id="btn-guardar-todo">💾 Guardar todo</button>`;

  $('btn-reconfig').onclick = () => mostrarModalConfig(grupo, nombreGrupo, configGrupo);

  // Construir cabecera
  let cabeceraActs = config.actividades.map(a =>
    `<th class="th-act" title="${a.nombre}${config.modo==='PORCENTAJES'?' ('+a.peso+'%)':''}">${a.letra}${config.modo==='PORCENTAJES'?'<br><span class="th-pct">'+a.peso+'%</span>':''}</th>`
  ).join('');

  let filas = estudiantes.map((est, idx) => {
    const n = notas[est] || {};
    const pac = calcularPAC(n, config);
    const auto = calcularAUTO(n);
    const mtn = pac !== null ? Math.round(pac * 0.9 * 100)/100 : null;
    const mta = auto !== null ? Math.round(auto * 0.1 * 100)/100 : null;
    const def = calcularDEF(pac, auto);
    const vdef = def !== null ? Math.round((def - MIN_APROBATORIO) * 100)/100 : null;
    const estado = estadoAprobacion(def);

    const celdas = config.actividades.map(a => {
      const val = n[a.letra] ?? '';
      return `<td class="td-nota"><input class="input-nota ${colorNota(val)}" data-est="${est}" data-campo="${a.letra}" value="${val}" maxlength="5" autocomplete="off"></td>`;
    }).join('');

    const celdasAuto = ['coe','het','pau'].map(campo => {
      const val = n[campo] ?? '';
      return `<td class="td-nota td-auto"><input class="input-nota input-auto ${colorNota(val)}" data-est="${est}" data-campo="${campo}" value="${val}" maxlength="5" autocomplete="off"></td>`;
    }).join('');

    return `<tr class="fila-est" id="fila-${idx}">
      <td class="td-num">${idx+1}</td>
      <td class="td-nombre">${est}</td>
      ${celdas}
      <td class="td-calc pac">${pac !== null ? pac : ''}</td>
      ${celdasAuto}
      <td class="td-calc auto">${auto !== null ? auto : ''}</td>
      <td class="td-calc mtn">${mtn !== null ? mtn : ''}</td>
      <td class="td-calc mta">${mta !== null ? mta : ''}</td>
      <td class="td-calc def ${colorNota(def)}">${def !== null ? def : ''}</td>
      <td class="td-calc vdef ${vdef !== null ? (vdef >= 0 ? 'nota-ok':'nota-mal') : ''}">${vdef !== null ? (vdef >= 0 ? '+' : '') + vdef : ''}</td>
      <td class="td-estado ${estado === 'APROBÓ' ? 'aprobado' : estado === 'NO APROBÓ' ? 'reprobado' : ''}">${estado}</td>
    </tr>`;
  }).join('');

  $('panel-grupo').innerHTML = `

  // Eventos inputs
  document.querySelectorAll('.input-nota').forEach(inp => {
    inp.addEventListener('input', e => onInputNota(e.target, grupo));

      if (val === 'PLA') {
        e.target.value = 'PLA';

    btnAdd.onclick = () => agregarActividad(grupo, nombreGrupo);

        renderPlanilla(grupo, nombreGrupo);

  actualizarResumen(grupo, estudiantes, config);

function onInputNota(inp, grupo) {
  const est = inp.dataset.est;
  const campo = inp.dataset.campo;
  const val = inp.value.trim();

  // Actualizar cache
  if (!notasCache[grupo]) notasCache[grupo] = {};
  if (!notasCache[grupo][est]) notasCache[grupo][est] = {};
  notasCache[grupo][est][campo] = val;

  // Color en tiempo real
  inp.className = `input-nota ${colorNota(val)} ${inp.classList.contains('input-auto') ? 'input-auto' : ''}`;

  // Recalcular fila
  recalcularFila(est, grupo, configGrupo);
  actualizarResumen(grupo, ESTUDIANTES[grupo], configGrupo);
}

function recalcularFila(est, grupo, config) {
  const n = notasCache[grupo]?.[est] || {};
  const idx = (ESTUDIANTES[grupo] || []).indexOf(est);
  if (idx < 0) return;

  const pac = calcularPAC(n, config);
  const auto = calcularAUTO(n);
  const mtn = pac !== null ? Math.round(pac * 0.9 * 100)/100 : null;
  const mta = auto !== null ? Math.round(auto * 0.1 * 100)/100 : null;
  const def = calcularDEF(pac, auto);
  const vdef = def !== null ? Math.round((def - MIN_APROBATORIO) * 100)/100 : null;
  const estado = estadoAprobacion(def);

  const row = document.getElementById(`fila-${idx}`);
  if (!row) return;
  const celdas = row.querySelectorAll('td');
  const actLen = config.actividades.length;
  const base = 2 + actLen; // #, nombre, ...acts

  const set = (td, val, cls = '') => { td.textContent = val ?? ''; td.className = `td-calc ${cls}`; };

  set(celdas[base], pac !== null ? pac : '');          // PAC
  set(celdas[base+4], auto !== null ? auto : '');       // AUTO
  set(celdas[base+5], mtn !== null ? mtn : '');         // MTN
  set(celdas[base+6], mta !== null ? mta : '');         // MTA

  const defTd = celdas[base+7];
  defTd.textContent = def !== null ? def : '';
  defTd.className = `td-calc def ${colorNota(def)}`;

  const vdefTd = celdas[base+8];
  vdefTd.textContent = vdef !== null ? (vdef >= 0 ? '+' : '') + vdef : '';
  vdefTd.className = `td-calc vdef ${vdef !== null ? (vdef >= 0 ? 'nota-ok':'nota-mal') : ''}`;

  const estadoTd = celdas[base+9];
  estadoTd.textContent = estado;
  estadoTd.className = `td-estado ${estado === 'APROBÓ' ? 'aprobado' : estado === 'NO APROBÓ' ? 'reprobado' : ''}`;
}

function actualizarResumen(grupo, estudiantes, config) {
  const notas = notasCache[grupo] || {};
  let aprob = 0, repro = 0, sumDef = 0, conDef = 0;
  estudiantes.forEach(est => {
    const n = notas[est] || {};
    const def = calcularDEF(calcularPAC(n, config), calcularAUTO(n));
    if (def !== null) {
      conDef++;
      sumDef += def;
      if (def >= MIN_APROBATORIO) aprob++;
      else repro++;
    }
  });
  const ra = $('res-aprob'); if(ra) ra.textContent = aprob;
  const rr = $('res-repro'); if(rr) rr.textContent = repro;
  const rp = $('res-prom'); if(rp) rp.textContent = conDef > 0 ? (sumDef/conDef).toFixed(2) : '–';
}

function moverFoco(inp, reversa) {
  const inputs = Array.from(document.querySelectorAll('.input-nota'));
  const i = inputs.indexOf(inp);
  const next = inputs[reversa ? i-1 : i+1];
  if (next) { next.focus(); next.select(); }
}

function agregarActividad(grupo, nombreGrupo) {
  const letras = 'ABCDEFGHIJKLMNOPQRSTUVWXY';
  const idx = configGrupo.actividades.length;
  const letra = letras[idx] || String(idx+1);

  // Modal simple para pedir nombre
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.style.display = 'flex';
  overlay.innerHTML = `
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <h3>Nueva actividad <span style="color:var(--accent)">${letra}</span></h3>
        <button class="modal-close" id="new-act-cancel">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row" style="margin-bottom:16px">
          <label class="form-label">Nombre de la actividad</label>
          <input id="new-act-nombre" class="input-md" style="width:100%" 
            placeholder="Ej: Taller, Proyecto, Cuaderno..." autofocus>
        </div>
        ${configGrupo.modo === 'PORCENTAJES' ? `
        <div class="form-row" style="margin-bottom:16px">
          <label class="form-label">Porcentaje (%)</label>
          <input id="new-act-peso" class="input-xs" type="number" value="10" min="1" max="100">
        </div>` : ''}
        <div class="modal-actions">
          <button class="btn-secondary" id="new-act-cancel2">Cancelar</button>
          <button class="btn-primary" id="new-act-ok">Agregar</button>
        </div>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  const inp = document.getElementById('new-act-nombre');
  inp.focus();

  const cerrar = () => overlay.remove();
  document.getElementById('new-act-cancel').onclick = cerrar;
  document.getElementById('new-act-cancel2').onclick = cerrar;

  const confirmar = async () => {
    const nombre = inp.value.trim();
    if (!nombre) { inp.focus(); return; }
    const peso = parseFloat(document.getElementById('new-act-peso')?.value) || 10;
    configGrupo.actividades.push({letra, nombre, peso});
    setLoading('Guardando actividad...');
    try {
      await guardarConfig(grupo, configGrupo);
      clearLoading();
      cerrar();
      toast(`Actividad ${letra} — "${nombre}" agregada ✓`);
      renderPlanilla(grupo, nombreGrupo);
    } catch(e) { clearLoading(); toast('Error guardando', 'err'); }
  };

  document.getElementById('new-act-ok').onclick = confirmar;
  inp.addEventListener('keydown', e => { if(e.key === 'Enter') confirmar(); });
}

async function guardarTodo(grupo, estudiantes, config) {
  setLoading('Guardando notas...');
  try {
    const notas = notasCache[grupo] || {};
    const promises = estudiantes.map(est =>
      guardarNotas(grupo, est, notas[est] || {})
    );
    await Promise.all(promises);
    clearLoading();
    toast(`${estudiantes.length} estudiantes guardados ✓`);
  } catch(e) {
    clearLoading();
    toast('Error al guardar', 'err');
    console.error(e);
  }
}

// ── AUTH STATE ─────────────────────────────────────────────────────────────
auth.onAuthStateChanged(user => {
  clearLoading();
  if (user) {
    if (user.email !== DOCENTE_AUTORIZADO) {
      toast('Correo no autorizado para este sistema', 'err');
      auth.signOut();
      renderLogin();
      return;
    }
    currentUser = user;
    renderApp(user);
  } else {
    currentUser = null;
    renderLogin();
  }
});
</script>
